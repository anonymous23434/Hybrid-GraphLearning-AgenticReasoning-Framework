# Agent Configuration
# Weights should sum to desired proportion of overall score

agents:
  benfords_law:
    enabled: true
    weight: 0.10
    min_samples: 30
    critical_chi_square: 15.507  # 95% confidence, 8 degrees of freedom

  beneish_mscore:
    enabled: true
    weight: 0.10
    threshold: -2.22  # Standard M-Score threshold

  altman_zscore:
    enabled: true
    weight: 0.20            # Highest weight — gold standard bankruptcy predictor
    safe_zone: 2.99         # Z > 2.99 = safe
    grey_zone: 1.81         # 1.81 < Z < 2.99 = grey zone
                            # Z < 1.81 = distress (high fraud risk)

  cashflow_earnings:
    enabled: true
    weight: 0.20            # High weight — direct earnings manipulation signal
    low_suspicion_threshold: 0.05   # |accrual ratio| > 5% → flag
    high_suspicion_threshold: 0.10  # |accrual ratio| > 10% → high risk
    critical_threshold: 0.20        # |accrual ratio| > 20% → critical

  debt_anomaly:
    enabled: true
    weight: 0.15
    d2e_high: 3.0           # Debt-to-Equity HIGH threshold
    d2e_critical: 6.0       # Debt-to-Equity CRITICAL threshold
    debt_ratio_high: 0.75   # Total debt / Assets HIGH threshold
    debt_ratio_critical: 0.90
    icr_low: 2.0            # Interest Coverage Ratio LOW threshold
    icr_critical: 1.0       # Interest Coverage Ratio CRITICAL

  related_party:
    enabled: true
    weight: 0.15
    elevated_threshold: 0.10  # RPT > 10% of liabilities → elevated
    high_threshold: 0.25      # RPT > 25% of liabilities → HIGH
    critical_threshold: 0.50  # RPT > 50% of liabilities → CRITICAL

  expense_padding:
    enabled: true
    weight: 0.10
    e2r_watch: 0.95           # Expense-to-Revenue watch threshold
    e2r_elevated: 1.05        # E2R elevated
    e2r_high: 1.20            # E2R high risk
    e2r_critical: 1.50        # E2R critical

  tax_rate_anomaly:
    enabled: true
    weight: 0.08              # Single-year financial statement check

  financing_red_flags:
    enabled: true
    weight: 0.08              # Cash-flow Ponzi signal

  asset_quality:
    enabled: true
    weight: 0.08              # Balance sheet opacity check

  eps_consistency:
    enabled: true
    weight: 0.06              # Arithmetic cross-check

  negative_equity:
    enabled: true
    weight: 0.08              # Insolvency / capital destruction check

  liquidity_crunch:
    enabled: true
    weight: 0.08              # Short-term liquidity stress check

  depreciation_anomaly:
    enabled: true
    weight: 0.06              # Depreciation policy plausibility check

  cashflow_composition:
    enabled: true
    weight: 0.08              # Cash source composition check

# Pipeline weights (for final score combination)
pipelines:
  structured:
    weight: 0.50
  unstructured:
    weight: 0.20

# Score combination settings
combination:
  normalize_weights: true  # Redistribute weights if agents unavailable
  min_confidence: 0.3      # Minimum confidence to include in final score
